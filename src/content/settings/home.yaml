welcomeText: Quantum knowledge Worth Spreading
heading: Quantum Computer Systems Lecture Series
subheading: >-
  A lecture series ranging from introductory to advanced research topics in
  quantum computing systems.
recentLecturesTitle: Recent Lectures
aboutSeriesTitle: About QuCS
aboutSeriesText: >-
  QuCS aims to build basic quantum knowledge and introduce the latest research
  for audiences without quantum computing background but interested in learning.
  The series covers topics from quantum fundamentals to cutting-edge research in
  compilation, error correction, machine learning, and more.
